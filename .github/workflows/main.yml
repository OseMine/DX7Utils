name: Compile Python to C Executables

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Cython
        run: pip install cython
      - name: Convert Python to C
        run: |
          mkdir -p build/linux
          cython --embed main.py -o build/linux/main.c
          for file in src/*.py; do
            cython --embed "$file" -o "build/linux/$(basename ${file%.py}).c"
          done
      - name: Compile C files with GCC
        run: |
          for file in build/linux/*.c; do
            gcc "$file" -o "${file%.c}" $(python3-config --cflags --ldflags --embed)
          done
      - name: Copy runtime sources
        run: |
          cp -r src build/linux/
          cp -r dx7utils build/linux/
          cp -r data build/linux/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: build/linux/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Cython
        run: pip install cython
      - name: Convert Python to C
        run: |
          mkdir -p build/macos
          cython --embed main.py -o build/macos/main.c
          for file in src/*.py; do
            cython --embed "$file" -o "build/macos/$(basename ${file%.py}).c"
          done
      - name: Compile C files with GCC
        run: |
          for file in build/macos/*.c; do
            gcc "$file" -o "${file%.c}" $(python3-config --cflags --ldflags --embed)
          done
      - name: Copy runtime sources
        run: |
          cp -r src build/macos/
          cp -r dx7utils build/macos/
          cp -r data build/macos/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: build/macos/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Cython
        run: pip install cython
      - name: Install MinGW-w64
        run: choco install mingw --version=13.2.0 --no-progress -y
      - name: Convert Python to C
        shell: pwsh
        run: |
          mkdir -p build/windows
          cython --embed main.py -o "build/windows/main.c"
          Get-ChildItem -Path "src/*.py" | ForEach-Object {
            cython --embed $_.FullName -o "build/windows/$($_.BaseName).c"
          }
      - name: Compile C files with GCC
        shell: pwsh
        run: |
          $prefix = python -c "import sys; print(sys.prefix)"
          $inc = "$prefix/include"
          $libsDir = "$prefix/libs"
          $pyVer = python -c "import sys; print(f'{sys.version_info.major}{sys.version_info.minor}')"
          $lib = "python$pyVer.lib"
          if (-not (Test-Path "$libsDir/$lib")) {
            $lib = (Get-ChildItem "$libsDir/python*.lib" | Sort-Object Name -Descending | Select-Object -First 1).Name
          }
          Write-Host "Using Python import library: $lib in $libsDir"

          $chocoPath = "C:\ProgramData\mingw64\mingw64\bin"
          if (Test-Path "$chocoPath\gcc.exe") {
            $env:PATH = "$chocoPath;$env:PATH"
            Write-Host "Using choco MinGW at: $chocoPath"
          } else {
            Write-Host "Choco MinGW not found, using system GCC"
          }

          # Provide WinMain so linking succeeds regardless of subsystem default
          $wrapperFlag = "$env:TEMP\winmain_wrapper.c"
          @(
          '#define WIN32_LEAN_AND_MEAN',
          '#include <windows.h>',
          'int main(int, char**);',
          'int WINAPI WinMain(HINSTANCE hInst, HINSTANCE hPrev, LPSTR lpCmdLine, int nShow) {',
          '    (void)hInst; (void)hPrev; (void)lpCmdLine; (void)nShow;',
          '    AttachConsole(ATTACH_PARENT_PROCESS);',
          '    return main(__argc, __argv);',
          '}'
          ) | Set-Content $wrapperFlag
          $wrapperObj = "$env:TEMP\winmain_wrapper.o"
          gcc -c $wrapperFlag -o $wrapperObj -I "$inc"

          Get-ChildItem -Path "build/windows/*.c" | ForEach-Object {
            gcc $_.FullName $wrapperObj -o "$($_.DirectoryName)\$($_.BaseName).exe" `
              -I "$inc" -L "$libsDir" "-l:$lib"
          }
      - name: Copy runtime sources
        shell: pwsh
        run: |
          $prefix = python -c "import sys; print(sys.prefix)"
          Copy-Item -Recurse -Path "src" -Destination "build/windows/"
          Copy-Item -Recurse -Path "dx7utils" -Destination "build/windows/"
          if (Test-Path "data") { Copy-Item -Recurse -Path "data" -Destination "build/windows/" }
          # Copy Python DLL so the exe runs standalone
          Copy-Item -Path "$prefix/python312.dll" -Destination "build/windows/"
          # Copy bundled stdlib zip if available, else copy full Lib
          if (Test-Path "$prefix/python312.zip") {
            Copy-Item -Path "$prefix/python312.zip" -Destination "build/windows/"
          } elseif (Test-Path "$prefix/Lib") {
            Copy-Item -Recurse -Path "$prefix/Lib" -Destination "build/windows/"
          }
      - uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: build/windows/
