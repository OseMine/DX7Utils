name: Compile Python to C Executables

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Cython
        run: pip install cython
      - name: Convert Python to C
        run: |
          mkdir -p build/linux
          for file in scripts/*.py; do
            cython --embed "$file" -o "build/linux/$(basename ${file%.py}).c"
          done
      - name: Compile C files with GCC
        run: |
          for file in build/linux/*.c; do
            gcc "$file" -o "${file%.c}" $(python3-config --cflags --ldflags --embed)
          done
      - uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: build/linux/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Cython
        run: pip install cython
      - name: Convert Python to C
        run: |
          mkdir -p build/macos
          for file in scripts/*.py; do
            cython --embed "$file" -o "build/macos/$(basename ${file%.py}).c"
          done
      - name: Compile C files with GCC
        run: |
          for file in build/macos/*.c; do
            gcc "$file" -o "${file%.c}" $(python3-config --cflags --ldflags --embed)
          done
      - uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: build/macos/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Cython
        run: pip install cython
      - name: Install MinGW-w64
        run: choco install mingw --version=13.2.0 --no-progress -y
      - name: Convert Python to C
        shell: pwsh
        run: |
          mkdir -p build/windows
          Get-ChildItem -Path "scripts/*.py" | ForEach-Object {
            cython --embed $_.FullName -o "build/windows/$($_.BaseName).c"
          }
      - name: Compile C files with GCC
        shell: pwsh
        run: |
          $prefix = python -c "import sys; print(sys.prefix)"
          $inc = "$prefix/include"
          $libsDir = "$prefix/libs"
          Get-ChildItem -Path "build/windows/*.c" | ForEach-Object {
            gcc $_.FullName -o "$($_.DirectoryName)\$($_.BaseName).exe" `
              -I "$inc" -L "$libsDir" -l:python3.lib
          }
      - uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: build/windows/
